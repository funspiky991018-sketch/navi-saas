<!DOCTYPE html>
<html>
<head>
    <title>NAVI Simple</title>
</head>
<body>

<h2>NAVI Resume Tool</h2>

<p>Resume:</p>
<textarea id="resume" rows="6" cols="60"></textarea>

<p>Job Description:</p>
<textarea id="job" rows="6" cols="60"></textarea>

<br><br>

<button onclick="analyze()">Analyze</button>
<button onclick="fixResume()">Fix Resume</button>

<h3>Result:</h3>
<div id="output"></div>

<script>
const API = "https://navi-api-254r.onrender.com";

async function analyze() {
    const resume = document.getElementById("resume").value;
    const job = document.getElementById("job").value;

    const res = await fetch(API + "/analyze", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({resume, job})
    });

    const data = await res.json();

    document.getElementById("output").innerHTML =
        "Score: " + data.score + "%<br>" +
        "Missing: " + data.missing_skills.join(", ");
}

async function fixResume() {
    const resume = document.getElementById("resume").value;

    const res = await fetch(API + "/fix-resume", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({resume})
    });

    const data = await res.json();

    let text = "";

    data.improved.forEach(item => {
        text += "Original: " + item.original + "<br>";
        text += "Improved: " + item.improved + "<br><br>";
    });

    document.getElementById("output").innerHTML = text;
}
</script>

</body>
</html>
